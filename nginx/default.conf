upstream idrive_tube_web {
  server web:3000;
  keepalive 32;
}

map $http_x_forwarded_proto $upstream_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server {
  listen 80;
  server_name _;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = /api/auth/login {
    limit_req zone=login_limit burst=5 nodelay;
    proxy_pass http://idrive_tube_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $upstream_forwarded_proto;
  }

  location = /_media_auth {
    internal;
    proxy_pass http://idrive_tube_web/api/media-auth?videoId=$video_id;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Original-URI $request_uri;
  }

  location ~ "^/media/(?<video_id>[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12})/(?<media_file>[a-zA-Z0-9._-]+)$" {
    auth_request /_media_auth;
    alias /data/hls/$video_id/$media_file;
    add_header Cache-Control "no-store" always;
    types {
      application/vnd.apple.mpegurl m3u8;
      video/mp4 mp4;
      video/iso.segment m4s;
    }
  }

  location / {
    proxy_pass http://idrive_tube_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $upstream_forwarded_proto;
  }
}
